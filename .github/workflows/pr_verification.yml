---
name: PR verification

on:
  pull_request:
  push:
    branches:
      - 'master'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verification:
    name: PR Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set Environment Variables
        uses: ./.github/actions/set-vars
        with:
          filePath: ./.github/variables/java_config.env

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run spotless check
        run: ./gradlew spotlessCheck --build-cache --configuration-cache

      - name: Build project
        run: ./gradlew assemble --build-cache --configuration-cache

      - name: Run unit tests
        run: ./gradlew test coverage --build-cache --configuration-cache

      - name: Archive reports
        uses: actions/upload-artifact@v7
        with:
          name: unit_test_reports
          path: |
            **/build/**/jacoco*.xml
            **/build/classes/

      - name: Run Sonar Scan
        run: |
          SONAR_SCAN_SCRIPT='./.github/scripts/sonar_scan.sh'
          chmod +x "${SONAR_SCAN_SCRIPT}"
          "${SONAR_SCAN_SCRIPT}"
