---
name: PR verification

# What triggers this workflow
on:
  pull_request: # Pull requests
  push: # Merges to master
    branches:
      - 'master'
  workflow_dispatch: # Manual trigger

# Concurrency defines how many concurrent runs of this workflow are allowed.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verification:
    name: PR Verification
    runs-on: ubuntu-latest # Machine this workflow will run on. Other Github-hosted runners include: windows-latest, macos-latest.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch full commit history. Usually needed for SonarQube analysis.
          ref: ${{ github.event.pull_request.head.sha }} # Actual PR commit (HEAD).

      # A small utility action that takes a file with key=value pairs and sets them as environment variables for the rest of the workflow.
      - name: Set Environment Variables
        uses: ./.github/actions/set-vars
        with:
          filePath: ./.github/variables/java_config.env

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Gradle dependencies
        uses: gradle/actions/setup-gradle@v5

      - name: Configure Gradle
        run: |
          mkdir -p ~/.gradle
          cat <<EOF >> ~/.gradle/gradle.properties
          org.gradle.caching=true
          org.gradle.configuration-cache=true
          org.gradle.parallel=true
          EOF

      - name: Run spotless check
        run: ./gradlew spotlessCheck

      - name: Build project
        run: ./gradlew assemble

      - name: Run unit tests
        run: ./gradlew test --rerun coverage

      # Here we upload the test reports as artifacts. They are needed for the SonarQube analysis in the next step, but not in this case as scanning is faked here.
      - name: Archive reports
        uses: actions/upload-artifact@v7
        with:
          name: unit_test_reports
          path: |
            **/build/**/jacoco*.xml
            **/build/classes/

      # Fake SonarQube scan.
      - name: Run Sonar Scan
        run: |
          SONAR_SCAN_SCRIPT='./.github/scripts/sonar_scan.sh'
          chmod +x "${SONAR_SCAN_SCRIPT}"
          "${SONAR_SCAN_SCRIPT}"
